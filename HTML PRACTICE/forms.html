<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <style>
        input{
            background-color: aqua;
        }
        p{
            background-color: blue;
            color: aliceblue;
        }
    </style>
</head>
<body>
    <h1>DATA BASE OF A STUDENT</h1>
    <form action="/process.php"></form>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" name="name" placeholder="YOUR NAME HERE">
    <br>
    <br>
    <form action="fathers name">Fathers Name</form>
    <input type="text" id="Fathers Name" name="fathers name" placeholder="your father name" >
    <form action="mothers name">Mothers Name </form>
    <input type="text" name="mothers name" placeholder="mother name">
    <br><br><br>
    <input type="submit" value="submit">
    <form action="phone">phone no.</form>
    <input type="tel" name="phone" placeholder="enter your no.">
    <H1>your gender</H1>
    <label for="gender">others</label>
    <input type="radio" id="others" name="gender" value="others">
    <br>
    <label for="gender">female</label>
    <input type="radio" id="female" name="gender" value="male">
    <br>
    <label for="male">male</label>
    <input type="radio" id="male" name="gender" value="female">
    <p>tell me your hobbies </p>
    <label for="playing">playing</label>
    <input type="checkbox" name="playing" id="playing">
    <br>
    <label for="reading">reading</label>
    <input type="checkbox" name="reading" id="reading">
    <br>
    <label for="cooking">cooking</label>
    <input type="checkbox" name="cooking" id="checkbox">
    <br>
    <label for="singing">singing</label>
    <input type="checkbox" name="singing" id="singing">
    <br>
    <label for="city">choose your city :</label>
    <select name="city" id="city">
        <option value="mumbai">mumbai</option>
    <option value="delhi">delhi</option>
    <option value="karnatka">karnatka</option>
    <option value="oddisha">oddisha</option>
    <option value="uttar pradesh">uttar pradesh</option>
    </select>
</body>
</html>
